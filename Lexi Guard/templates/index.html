<!DOCTYPE html>
<html>
<head>
    <title>LexiGuard | AI Contract Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 80px;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
        }

        .logo span {
            color: #00f5d4;
        }

        .hero {
            text-align: center;
            margin-top: 40px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
        }

        .hero p {
            margin-top: 15px;
            font-size: 16px;
            color: #cfd8dc;
        }

        .card {
            max-width: 850px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            resize: none;
            margin-top: 10px;
        }

        input[type="file"] {
            margin-top: 10px;
            color: white;
        }

        .upload-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        .btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: linear-gradient(90deg, #00f5d4, #00bbf9);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00f5d4;
        }

        .features {
            max-width: 1100px;
            margin: 70px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
            padding: 0 40px;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .feature:hover {
            transform: translateY(-10px);
            background: rgba(0,245,212,0.2);
        }

        .feature h3 {
            margin-bottom: 10px;
            color: #00f5d4;
        }

        footer {
            text-align: center;
            margin: 40px 0;
            color: #bbb;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">Lexi<span>Guard</span></div>
    <div>AI Contract Intelligence</div>
</div>

<div class="hero">
    <h1>Analyze Contracts. Detect Risks. Simplify Legal Language.</h1>
    <p>AI-powered legal assistant that protects you from hidden contract dangers.</p>
</div>

<div class="card">
    <form action="/analyze" method="POST" enctype="multipart/form-data">

        <label><b>Paste Agreement Text</b></label>
        <textarea name="manual_text" placeholder="Paste your contract here..."></textarea>

        <div class="upload-section">
            <label><b>Or Upload File</b></label><br><br>

            📄 PDF:
            <input type="file" name="pdf_file" accept=".pdf"><br><br>

            🖼 Image:
            <input type="file" name="image_file" accept=".png,.jpg,.jpeg">
        </div>

        <button type="submit" class="btn">🚀 Analyze Contract</button>

    </form>
</div>

<footer>
    © 2026 LexiGuard | Built with AI & Flask
</footer>

</body>
</html>
